<section class="page-shell auth-page">
  <div class="auth-panel surface-card">
    <div>
      <p class="eyebrow">Espace gestion</p>
      <h1>Connexion gestionnaire</h1>
      <p>Accès réservé à l’équipe Kpop in Lyon.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small>Un email valide est requis.</small>
        }
      </label>

      <label>
        <span>Mot de passe</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small>Ce champ est obligatoire.</small>
        }
      </label>

      @if (error()) {
        <div class="error-box">
          <p>{{ error() }}</p>
          @if (errorDetail()) {
            <small>{{ errorDetail() }}</small>
          }
        </div>
      }

      <div class="auth-actions">
        <button type="submit" class="button-primary" [disabled]="loading()">
          {{ loading() ? 'Connexion...' : 'Se connecter' }}
        </button>
        <a routerLink="/" class="ghost-button">Retour au site</a>
      </div>
    </form>
  </div>
</section>
