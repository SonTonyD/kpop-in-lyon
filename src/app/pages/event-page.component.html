<section
  class="event-hero page-hero"
  [style.background-image]="'linear-gradient(180deg, rgba(6, 6, 18, 0.28), rgba(6, 6, 18, 0.82)), url(' + event.image + ')'"
>
  <div class="page-hero__content surface-card">
    <p class="eyebrow">Event</p>
    <h1>{{ event.title }}</h1>
    <div class="event-highlights">
      <span>{{ event.date }}</span>
      <span>{{ event.location }}</span>
    </div>
    <p>{{ event.description }}</p>
  </div>
</section>
